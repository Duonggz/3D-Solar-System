<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <!-- Importmap -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.152.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/" } }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        
        canvas {
            display: block;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000428, #004e92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease-out;
        }

        .loading-content {
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        .loading-spaceship {
            font-size: 4rem;
            margin-bottom: 2rem;
            animation: takeoff 2s ease-in-out infinite;
        }

        .loading-bar-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #0080ff);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading-text {
            font-size: 1.2rem;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* HUD Elements */
        .hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .corner-decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(0, 255, 255, 0.5);
        }

        .corner-tl {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        /* Control Help */
        .controls-help {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            max-width: 300px;
        }

        .controls-help h3 {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.8rem;
            color: #ccc;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes takeoff {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .controls-help {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spaceship">🚀</div>
            <h1 style="margin-bottom: 20px; color: #00ffff; text-shadow: 0 0 20px rgba(0, 255, 255, 0.7);">
                SPACE EXPLORER
            </h1>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
            <div class="loading-text" id="loading-text">Initializing systems...</div>
        </div>
    </div>

    <!-- HUD Overlay -->
    <div class="hud-overlay">
        <div class="corner-decoration corner-tl"></div>
        <div class="corner-decoration corner-tr"></div>
        <div class="corner-decoration corner-bl"></div>
        <div class="corner-decoration corner-br"></div>

        <div class="controls-help">
            <h3>🕹️ CONTROLS</h3>
            <div class="control-item">
                <span>WASD:</span>
                <span>Movement</span>
            </div>
            <div class="control-item">
                <span>JK:</span>
                <span>Vertical</span>
            </div>
            <div class="control-item">
                <span>Arrows:</span>
                <span>Rotation</span>
            </div>
            <div class="control-item">
                <span>V:</span>
                <span>View Toggle</span>
            </div>
            <div class="control-item">
                <span>L:</span>
                <span>Boost</span>
            </div>
        </div>
    </div>

    <script type="module" src="bay.js"></script>
</body>

</html>
